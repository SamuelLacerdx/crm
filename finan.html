    <main class="tela-finan">
      <div class="topo-finan">
        <h1>Financeiro</h1>
        <div class="add-gasto"><button>Adicionar Gasto Fixo</button></div>
      </div>

      <section class="container-finan">
        <div class="valores">
          <div class="caixa-valor" id="valor-entrada">
            <h2>Entrada:</h2>
            <p>400</p>
          </div>
          <div class="caixa-valor" id="valor-saida">
            <h2>Saída:</h2>
            <p>400</p>
          </div>
          <div class="caixa-valor" id="total-valores">
            <h2>Valor Total:</h2>
            <p>10000</p>
          </div>
        </div>

        <div class="grid-finan">
          <div class="gastos-fixos">
            <h3>Gasto Fixo</h3>
            <div class="gasto-fixo">
              <img src="" alt="imagem do gasto" />
              <p class="nome-gasto">gasto-fixo</p>
              <p class="valor-gasto">valor-gasto</p>
            </div>
          </div>

          <div class="extrato">
            <h1>Extrato</h1>
            <table>
              <thead>
                <tr>
                  <th>Cliente/Fornecedor</th>
                  <th>Venc.</th>
                  <th>Valor</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Cliente1</td>
                  <td>venc1</td>
                  <td>valor1</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
